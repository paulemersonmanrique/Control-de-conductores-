<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☄️ Asteroide Asesino - Sistema Solar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0f1e;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .game-wrapper {
            background: #141a2b;
            padding: 20px 20px 25px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px #3e4b66;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 400px;
            height: 600px;
            background: radial-gradient(circle at 20% 80%, #1a2340, #0b0f1a);
            border-radius: 24px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.7), 0 10px 20px rgba(0, 0, 0, 0.6);
            cursor: none;
        }
        .ui-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 0 6px;
            color: #b7d0f0;
            text-shadow: 0 2px 3px #00000088;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stats {
            display: flex;
            gap: 18px;
            background: #0e1424cc;
            padding: 6px 16px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            border: 1px solid #3e4f70;
            flex-wrap: wrap;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .stats i {
            font-style: normal;
            font-size: 1.1rem;
        }
        button {
            background: #2f3f62;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 16px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0c121f, 0 4px 12px #00000066;
            transition: all 0.08s linear;
            letter-spacing: 0.5px;
            border: 1px solid #5f77a0;
            display: none;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #0c121f;
        }
        button.visible {
            display: block;
        }
        button.next-level {
            background: #4a7a3a;
            border-color: #6aaa5a;
            box-shadow: 0 6px 0 #2a4a1a, 0 4px 20px #4a7a3a66;
            animation: pulse-glow 1.5s ease-in-out infinite;
        }
        button.next-level:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #2a4a1a;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 6px 0 #2a4a1a, 0 4px 20px #4a7a3a66; }
            50% { box-shadow: 0 6px 0 #2a4a1a, 0 4px 40px #6aaa5aaa; }
        }
        #gameOverMsg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0f1ee0;
            backdrop-filter: blur(4px);
            padding: 24px 36px;
            border-radius: 60px;
            border: 2px solid #ff7b5a;
            color: #ffe2c0;
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 0 60px #ff5e3a66;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        #gameOverMsg small {
            display: block;
            font-size: 1rem;
            font-weight: 400;
            color: #b7c9e6;
            margin-top: 8px;
        }
        #gameOverMsg.win {
            border-color: #6aaa5a;
            box-shadow: 0 0 60px #4a7a3a66;
        }
        #gameOverMsg.win small {
            color: #8acc7a;
        }
        .relative {
            position: relative;
        }
        .timer {
            color: #ffbb77;
            font-size: 0.8rem;
            background: #0e142488;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #ff8833;
        }
        .level-indicator {
            color: #ffcc88;
            font-size: 0.85rem;
            background: #0e142488;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid #ff8833;
            font-weight: bold;
        }
        .size-info {
            color: #8899bb;
            font-size: 0.7rem;
            background: #0e142488;
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px solid #3e4f70;
        }
        .color-indicator {
            color: #8899bb;
            font-size: 0.7rem;
            background: #0e142488;
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px solid #3e4f70;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="relative">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
            <div id="gameOverMsg">💥 IMPACTO<br><small>Mensaje</small></div>
        </div>

        <div class="ui-panel">
            <div class="stats">
                <span>⚡ <span id="velDisplay">100</span>%</span>
                <span>🧱 <span id="structureDisplay">5</span></span>
                <span>💀 <span id="killDisplay">0</span></span>
            </div>
            <div class="level-indicator" id="levelDisplay">☿ Mercurio</div>
            <div class="size-info" id="sizeDisplay">4.880 km</div>
            <div class="color-indicator" id="colorDisplay">🎨 Naranja</div>
            <div class="timer" id="timerDisplay">⏱ 0s</div>
            <button id="resetBtn">⟳ Reiniciar</button>
            <button id="nextLevelBtn" class="next-level">🚀 Siguiente Planeta</button>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const velSpan = document.getElementById('velDisplay');
            const structSpan = document.getElementById('structureDisplay');
            const killSpan = document.getElementById('killDisplay');
            const timerDisplay = document.getElementById('timerDisplay');
            const levelDisplay = document.getElementById('levelDisplay');
            const sizeDisplay = document.getElementById('sizeDisplay');
            const colorDisplay = document.getElementById('colorDisplay');
            const gameOverDiv = document.getElementById('gameOverMsg');
            const resetBtn = document.getElementById('resetBtn');
            const nextLevelBtn = document.getElementById('nextLevelBtn');

            const W = 400,
                H = 600;

            // ========== SISTEMA DE PLANETAS 130% MÁS GRANDES ==========
            const PLANETS = [
                { name: '☿ Mercurio', color: '#b5a8a0', size_km: 4880, appearTime: 22, speed: 0.45 },
                { name: '♀ Venus', color: '#e8cda0', size_km: 12104, appearTime: 25, speed: 0.40 },
                { name: '🌍 Tierra', color: '#4a8cff', size_km: 12756, appearTime: 28, speed: 0.35 },
                { name: '♂ Marte', color: '#c45a3a', size_km: 6794, appearTime: 24, speed: 0.42 },
                { name: '♃ Júpiter', color: '#d4a06a', size_km: 142984, appearTime: 35, speed: 0.25 },
                { name: '♄ Saturno', color: '#d4c48a', size_km: 108728, appearTime: 33, speed: 0.27 },
                { name: '♅ Urano', color: '#7ad4d4', size_km: 51118, appearTime: 30, speed: 0.30 },
                { name: '♆ Neptuno', color: '#3a6acc', size_km: 49532, appearTime: 28, speed: 0.32 }
            ];

            const ASTEROID_COLORS = [
                ['#ffcc00', '#ffaa00', '#ff8800', '#66ff33'],
                ['#ffaa00', '#ff6600', '#ff3333', '#55ff22'],
                ['#ffdd44', '#ff8800', '#ff4422', '#77ff44'],
                ['#ffbb22', '#ff7700', '#ff2222', '#44ff11'],
                ['#ffcc33', '#ff9933', '#ff5533', '#66ff55'],
                ['#ffdd55', '#ffaa33', '#ff6644', '#55ff33'],
                ['#ffbb44', '#ff8833', '#ff4433', '#44ff22'],
                ['#ffcc55', '#ff9922', '#ff3322', '#66ff44']
            ];

            const COLOR_NAMES = ['Amarillo', 'Naranja', 'Rojo', 'Verde Fluorescente'];

            function getPlanetRadius(planet) {
                const minRadius = 18 * 2.3;
                const maxRadius = 75 * 2.3;
                const minSize = 4880;
                const maxSize = 142984;
                const logMin = Math.log(minSize);
                const logMax = Math.log(maxSize);
                const logValue = Math.log(planet.size_km);
                const t = (logValue - logMin) / (logMax - logMin);
                return minRadius + t * (maxRadius - minRadius);
            }

            let currentPlanetIndex = 0;
            let currentLevel = 1;
            let enemyBaseSpeed = 2;
            let spawnRate = 35;
            let currentColorIndex = 0;

            // ---------- FONDO EN BUCLE INFINITO ----------
            let starOffset = 0;
            const STAR_SPEED = 1;

            const stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: 0.5 + Math.random() * 2,
                    brightness: 0.2 + Math.random() * 0.8,
                    speed: 0.3 + Math.random() * 2,
                    layer: Math.floor(Math.random() * 3)
                });
            }
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: -Math.random() * H,
                    size: 0.5 + Math.random() * 2,
                    brightness: 0.2 + Math.random() * 0.8,
                    speed: 0.3 + Math.random() * 2,
                    layer: Math.floor(Math.random() * 3)
                });
            }

            // ========== SISTEMA DE AUDIO ==========
            let audioCtx = null;
            let musicInterval = null;
            let musicActive = false;
            let musicGain = null;
            let audioInitialized = false;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    musicGain = audioCtx.createGain();
                    musicGain.gain.value = 0.96;
                    musicGain.connect(audioCtx.destination);
                }
            }

            function playExplosionSound() {
                try {
                    initAudio();
                    const now = audioCtx.currentTime;
                    
                    const bufferSize = audioCtx.sampleRate * 0.4;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (bufferSize * 0.15));
                        data[i] = (Math.random() * 2 - 1) * env * 0.9;
                    }
                    
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(1500, now);
                    filter.frequency.exponentialRampToValueAtTime(200, now + 0.3);
                    filter.Q.value = 1.5;
                    
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(0.6, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(musicGain || audioCtx.destination);
                    
                    noise.start(now);
                    noise.stop(now + 0.4);
                    
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
                    
                    const gain2 = audioCtx.createGain();
                    gain2.gain.setValueAtTime(0.4, now);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    
                    osc.connect(gain2);
                    gain2.connect(musicGain || audioCtx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.3);
                    
                    const osc2 = audioCtx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(300, now);
                    osc2.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    
                    const gain3 = audioCtx.createGain();
                    gain3.gain.setValueAtTime(0.15, now);
                    gain3.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    
                    osc2.connect(gain3);
                    gain3.connect(musicGain || audioCtx.destination);
                    
                    osc2.start(now);
                    osc2.stop(now + 0.2);
                } catch(e) {
                    console.log('Audio no disponible');
                }
            }

            function playCollisionSound() {
                try {
                    initAudio();
                    const now = audioCtx.currentTime;
                    
                    const bufferSize = audioCtx.sampleRate * 0.15;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        const env = Math.exp(-i / (bufferSize * 0.3));
                        data[i] = (Math.random() * 2 - 1) * env * 0.8;
                    }
                    
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'bandpass';
                    filter.frequency.value = 800 + Math.random() * 600;
                    filter.Q.value = 2;
                    
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(0.5, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(musicGain || audioCtx.destination);
                    
                    noise.start(now);
                    noise.stop(now + 0.15);
                    
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.12);
                    
                    const gain2 = audioCtx.createGain();
                    gain2.gain.setValueAtTime(0.3, now);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                    
                    osc.connect(gain2);
                    gain2.connect(musicGain || audioCtx.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.12);
                } catch(e) {
                    console.log('Audio no disponible');
                }
            }

            function startAmbientMusic() {
                try {
                    initAudio();
                    if (musicActive) return;
                    musicActive = true;
                    
                    let noteIndex = 0;
                    const notes = [48, 52, 50, 55, 52, 58, 46, 53];
                    const durations = [1.2, 1.6, 1.4, 1.8, 1.3, 2.0, 1.5, 1.7];
                    
                    function playNote() {
                        if (!musicActive) return;
                        
                        try {
                            const now = audioCtx.currentTime;
                            const freq = notes[noteIndex % notes.length] * 1.8;
                            const dur = durations[noteIndex % durations.length] * 0.6;
                            
                            const osc = audioCtx.createOscillator();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(freq, now);
                            osc.frequency.exponentialRampToValueAtTime(freq * 0.96, now + dur);
                            
                            const lfo = audioCtx.createOscillator();
                            lfo.frequency.value = 0.3 + Math.random() * 0.3;
                            lfo.type = 'sawtooth';
                            
                            const lfoGain = audioCtx.createGain();
                            lfoGain.gain.value = 2.5;
                            
                            lfo.connect(lfoGain);
                            lfoGain.connect(osc.frequency);
                            
                            const gain = audioCtx.createGain();
                            gain.gain.setValueAtTime(0.08, now);
                            gain.gain.exponentialRampToValueAtTime(0.02, now + dur);
                            
                            osc.connect(gain);
                            gain.connect(musicGain || audioCtx.destination);
                            
                            osc.start(now);
                            osc.stop(now + dur);
                            lfo.start(now);
                            lfo.stop(now + dur);
                            
                            const osc2 = audioCtx.createOscillator();
                            osc2.type = 'sawtooth';
                            osc2.frequency.setValueAtTime(freq * 1.02 + 10, now);
                            
                            const gain2 = audioCtx.createGain();
                            gain2.gain.setValueAtTime(0.03, now);
                            gain2.gain.exponentialRampToValueAtTime(0.005, now + dur);
                            
                            osc2.connect(gain2);
                            gain2.connect(musicGain || audioCtx.destination);
                            
                            osc2.start(now);
                            osc2.stop(now + dur);
                            
                            noteIndex++;
                            
                            const nextDelay = 0.6 + Math.random() * 1.5;
                            musicInterval = setTimeout(playNote, nextDelay * 1000);
                        } catch(e) {
                            console.log('Nota fallida');
                        }
                    }
                    
                    setTimeout(playNote, 400);
                } catch(e) {
                    console.log('Audio no disponible');
                }
            }

            function stopAmbientMusic() {
                musicActive = false;
                if (musicInterval) {
                    clearTimeout(musicInterval);
                    musicInterval = null;
                }
            }

            document.addEventListener('click', () => {
                if (!audioInitialized) {
                    initAudio();
                    audioInitialized = true;
                    startAmbientMusic();
                }
            }, { once: true });

            window.addEventListener('load', () => {
                try {
                    initAudio();
                    audioInitialized = true;
                    startAmbientMusic();
                } catch(e) {}
            });

            // ========== FIN SISTEMA DE AUDIO ==========

            // ---------- Sistema de partículas y asteroides de explosión ----------
            let trailParticles = [];
            let explosionAsteroids = [];

            function spawnTrailParticle(x, y, color) {
                trailParticles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: 1.0 + Math.random() * 2.0,
                    life: 1.0,
                    decay: 0.010 + Math.random() * 0.015,
                    size: 1 + Math.random() * 2,
                    color: color || '#81d4fa'
                });
            }

            function spawnExplosionAsteroids(x, y, count, radius, planetColor) {
                const colorSet = ASTEROID_COLORS[currentColorIndex];
                for (let j = 0; j < count; j++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1.5 + Math.random() * (4 + radius * 0.04);
                    const size = 8 + Math.random() * (12 + radius * 0.15);
                    const vertices = 6 + Math.floor(Math.random() * 5);
                    const polygon = generateIrregularPolygon(size, vertices, 0.5);
                    const color = colorSet[Math.floor(Math.random() * colorSet.length)];
                    
                    explosionAsteroids.push({
                        x: x + (Math.random() - 0.5) * radius * 0.3,
                        y: y + (Math.random() - 0.5) * radius * 0.3,
                        vx: Math.cos(angle) * speed * (0.6 + Math.random() * 0.4),
                        vy: Math.sin(angle) * speed * (0.6 + Math.random() * 0.4) - 0.5,
                        rotation: Math.random() * Math.PI * 2,
                        rotSpeed: (Math.random() - 0.5) * 0.06,
                        polygon: polygon,
                        color: color,
                        shadowColor: "#cc5500",
                        life: 1.0,
                        decay: 0.002 + Math.random() * 0.004,
                        radius: size,
                        gravity: 0.02 + Math.random() * 0.03,
                    });
                }
            }

            function updateExplosionAsteroids() {
                for (let i = explosionAsteroids.length - 1; i >= 0; i--) {
                    const a = explosionAsteroids[i];
                    a.x += a.vx;
                    a.y += a.vy;
                    a.vy += a.gravity;
                    a.rotation += a.rotSpeed;
                    a.life -= a.decay;
                    
                    if (a.life <= 0 || a.y > H + 100 || a.x < -100 || a.x > W + 100) {
                        explosionAsteroids.splice(i, 1);
                    }
                }
            }

            function drawExplosionAsteroids() {
                for (let a of explosionAsteroids) {
                    const alpha = a.life;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(a.x, a.y);
                    ctx.rotate(a.rotation);
                    
                    ctx.shadowColor = a.shadowColor || "#cc5500";
                    ctx.shadowBlur = 12;
                    
                    ctx.fillStyle = a.color;
                    ctx.beginPath();
                    ctx.moveTo(a.polygon[0].x, a.polygon[0].y);
                    for (let i = 1; i < a.polygon.length; i++) {
                        ctx.lineTo(a.polygon[i].x, a.polygon[i].y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = "rgba(30,20,15,0.4)";
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                    
                    ctx.restore();
                    ctx.globalAlpha = 1;
                }
            }

            function updateTrailParticles() {
                for (let i = trailParticles.length - 1; i >= 0; i--) {
                    const p = trailParticles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    p.size *= 0.995;
                    if (p.life <= 0 || p.size < 0.15) {
                        trailParticles.splice(i, 1);
                    }
                }
                if (trailParticles.length > 300) {
                    trailParticles.splice(0, trailParticles.length - 300);
                }
            }

            function drawTrailParticles() {
                for (let p of trailParticles) {
                    const alpha = p.life * 0.7;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color + Math.floor(alpha * 200).toString(16).padStart(2, '0');
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            // ---------- Funciones para polígonos irregulares ----------
            function generateIrregularPolygon(radius, vertices, irregularity) {
                const points = [];
                for (let i = 0; i < vertices; i++) {
                    const angle = (i / vertices) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                    const r = radius * (0.5 + Math.random() * irregularity);
                    points.push({
                        x: Math.cos(angle) * r,
                        y: Math.sin(angle) * r
                    });
                }
                return points;
            }

            // Generar continentes (estáticos)
            let continentPoints = [];

            function generateStaticContinents() {
                continentPoints = [];
                const continentData = [
                    { cx: -15, cy: -20, r: 35, v: 8, irr: 0.5 },
                    { cx: 25, cy: -10, r: 25, v: 7, irr: 0.5 },
                    { cx: -10, cy: 20, r: 30, v: 9, irr: 0.5 },
                    { cx: 30, cy: 25, r: 20, v: 6, irr: 0.5 },
                    { cx: -30, cy: 5, r: 18, v: 6, irr: 0.5 },
                    { cx: 5, cy: -35, r: 15, v: 5, irr: 0.5 },
                ];

                for (let data of continentData) {
                    const points = generateContinent(
                        0, 0,
                        data.r,
                        data.v,
                        data.irr
                    );
                    continentPoints.push({
                        points: points,
                        offsetX: data.cx,
                        offsetY: data.cy,
                        color: `hsl(${110 + Math.random() * 30}, ${50 + Math.random() * 30}%, ${35 + Math.random() * 25}%)`
                    });
                }
            }

            function generateContinent(cx, cy, radius, vertices, irregularity) {
                const points = [];
                for (let i = 0; i < vertices; i++) {
                    const angle = (i / vertices) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
                    const r = radius * (0.4 + Math.random() * irregularity);
                    points.push({
                        x: cx + Math.cos(angle) * r,
                        y: cy + Math.sin(angle) * r
                    });
                }
                return points;
            }

            function drawSolidPolygon(ctx, points, color, shadowColor) {
                if (points.length < 3) return;

                ctx.save();
                ctx.shadowColor = shadowColor || "transparent";
                ctx.shadowBlur = 8;

                ctx.fillStyle = color || "#8a7a6a";
                
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = "rgba(20, 60, 20, 0.4)";
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.restore();
                ctx.shadowBlur = 0;
            }

            function drawPlayerPolygon(ctx, x, y, points, color, shadowColor, rotation, glow, glowColor) {
                if (points.length < 3) return;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation || 0);

                ctx.shadowColor = shadowColor || "#b07c4a";
                ctx.shadowBlur = glow ? 30 : 15;

                ctx.fillStyle = color || "#8a7a6a";
                
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = "rgba(30, 20, 15, 0.7)";
                ctx.lineWidth = 1.5;
                ctx.stroke();

                if (glow) {
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = glowColor || "rgba(255, 200, 100, 0.4)";
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }

                ctx.restore();
                ctx.shadowBlur = 0;
            }

            function drawPlanet(ctx, planet, radius) {
                const { x, y, color, name } = planet;
                
                ctx.shadowColor = color;
                ctx.shadowBlur = 60;
                ctx.beginPath();
                ctx.arc(x, y, radius + 10, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,255,255,0.03)";
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.shadowColor = color;
                ctx.shadowBlur = 40;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                const grad = ctx.createRadialGradient(
                    x - radius * 0.2, y - radius * 0.2, 0,
                    x, y, radius
                );
                grad.addColorStop(0, lightenColor(color, 40));
                grad.addColorStop(0.5, color);
                grad.addColorStop(1, darkenColor(color, 40));
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.shadowBlur = 0;

                if (name.includes('Júpiter') || name.includes('Saturno') || name.includes('Urano') || name.includes('Neptuno')) {
                    ctx.strokeStyle = color + '44';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 8]);
                    ctx.beginPath();
                    ctx.arc(x, y, radius * 1.25, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                if (name === '♄ Saturno') {
                    ctx.strokeStyle = '#d4c48a66';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(x, y, radius * 1.6, radius * 0.35, 0.4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.ellipse(x, y, radius * 1.7, radius * 0.3, -0.4, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.strokeStyle = '#d4c48a44';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.ellipse(x, y, radius * 1.4, radius * 0.4, 0.1, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            function lightenColor(color, amount) {
                let r = parseInt(color.slice(1,2), 16) * 17 || parseInt(color.slice(1,3), 16);
                let g = parseInt(color.slice(2,3), 16) * 17 || parseInt(color.slice(3,5), 16);
                let b = parseInt(color.slice(3,4), 16) * 17 || parseInt(color.slice(5,7), 16);
                r = Math.min(255, r + amount);
                g = Math.min(255, g + amount);
                b = Math.min(255, b + amount);
                return `rgb(${r},${g},${b})`;
            }

            function darkenColor(color, amount) {
                let r = parseInt(color.slice(1,2), 16) * 17 || parseInt(color.slice(1,3), 16);
                let g = parseInt(color.slice(2,3), 16) * 17 || parseInt(color.slice(3,5), 16);
                let b = parseInt(color.slice(3,4), 16) * 17 || parseInt(color.slice(5,7), 16);
                r = Math.max(0, r - amount);
                g = Math.max(0, g - amount);
                b = Math.max(0, b - amount);
                return `rgb(${r},${g},${b})`;
            }

            // ---------- Función de colisión ----------
            function checkCollision(a, b) {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                const dist = Math.hypot(dx, dy);
                const threshold = a.collisionRadius + b.collisionRadius;
                return dist < threshold;
            }

            // ---------- Jugador (5 vidas) ----------
            const player = {
                x: 200,
                y: 500,
                radius: 36,
                collisionRadius: 36 * 0.8,
                speed: 1,
                structure: 5,
                baseRadius: 36,
                kills: 0,
                rotation: 0,
                polygon: null,
                visible: true,
            };

            function initPlayerPolygon() {
                player.polygon = generateIrregularPolygon(player.radius, 10, 0.5);
            }
            initPlayerPolygon();

            const playerColor = "#4fc3f7";
            const playerGlowColor = "rgba(79, 195, 247, 0.6)";
            const trailColor = "#81d4fa";

            // ---------- Planeta actual ----------
            let currentPlanet = {
                x: 200,
                y: -80,
                radius: 30,
                collisionRadius: 30 * 0.7,
                active: false,
                appearTime: 30,
                speed: 0.3,
                destroyed: false,
                color: '#4a8cff',
                name: '🌍 Tierra',
                size_km: 12756
            };

            function updatePlanetFromIndex(index) {
                const planet = PLANETS[index];
                const radius = getPlanetRadius(planet);
                currentPlanet.name = planet.name;
                currentPlanet.color = planet.color;
                currentPlanet.radius = radius;
                currentPlanet.collisionRadius = radius * 0.7;
                currentPlanet.appearTime = planet.appearTime;
                currentPlanet.speed = planet.speed;
                currentPlanet.size_km = planet.size_km;
                currentPlanet.active = false;
                currentPlanet.y = -80;
                currentPlanet.destroyed = false;
                levelDisplay.textContent = planet.name;
                sizeDisplay.textContent = planet.size_km.toLocaleString() + ' km';
                
                currentColorIndex = index % ASTEROID_COLORS.length;
                const colorSet = ASTEROID_COLORS[currentColorIndex];
                const colorName = COLOR_NAMES[currentColorIndex % COLOR_NAMES.length];
                colorDisplay.textContent = '🎨 ' + colorName;
            }

            generateStaticContinents();

            // Asteroides enemigos
            let enemies = [];
            let frameCounter = 0;

            // Control de teclas
            let keys = {
                up: false,
                down: false,
                left: false,
                right: false
            };

            let gameActive = true;
            let gameOverFlag = false;
            let gameTime = 0;
            let gameWon = false;

            // ---------- Reset ----------
            function resetGame() {
                player.x = 200;
                player.y = 500;
                player.structure = 5;
                player.radius = player.baseRadius;
                player.collisionRadius = player.baseRadius * 0.8;
                player.kills = 0;
                player.rotation = 0;
                player.visible = true;
                initPlayerPolygon();

                enemies = [];
                trailParticles = [];
                explosionAsteroids = [];
                frameCounter = 0;
                gameTime = 0;
                gameWon = false;

                currentPlanet.active = false;
                currentPlanet.y = -80;
                currentPlanet.destroyed = false;
                
                const planet = PLANETS[currentPlanetIndex];
                enemyBaseSpeed = 2 + currentPlanetIndex * 0.3;
                spawnRate = Math.max(18, 35 - currentPlanetIndex * 1.5);

                gameActive = true;
                gameOverFlag = false;

                gameOverDiv.style.display = 'none';
                gameOverDiv.classList.remove('win');
                resetBtn.classList.remove('visible');
                nextLevelBtn.classList.remove('visible');

                keys.up = false;
                keys.down = false;
                keys.left = false;
                keys.right = false;

                levelDisplay.textContent = planet.name;
                sizeDisplay.textContent = planet.size_km.toLocaleString() + ' km';
                
                const colorSet = ASTEROID_COLORS[currentColorIndex];
                const colorName = COLOR_NAMES[currentColorIndex % COLOR_NAMES.length];
                colorDisplay.textContent = '🎨 ' + colorName;
                
                updateUI();

                if (!musicActive) {
                    startAmbientMusic();
                }
            }

            function updateUI() {
                structSpan.textContent = player.structure;
                killSpan.textContent = player.kills;
                velSpan.textContent = '100';
                const timeLeft = Math.max(0, Math.ceil(currentPlanet.appearTime - gameTime));
                timerDisplay.textContent = currentPlanet.active ? '🌍 ¡PLANETA!' : `⏱ ${timeLeft}s`;
            }

            // ---------- Función para dividir asteroide ----------
            function splitAsteroid(enemy, angle) {
                if (enemy.radius > 10) {
                    const newRadius = enemy.radius * 0.5;
                    if (newRadius > 5) {
                        const fragments = [];
                        const colorSet = ASTEROID_COLORS[currentColorIndex];
                        for (let d = 0; d < 2; d++) {
                            const dirOffset = (d === 0) ? -0.6 : 0.6;
                            const newAngle = angle + dirOffset + (Math.random() - 0.5) * 0.5;
                            const speed = 0.8 + Math.random() * 1.2;
                            const newPolygon = generateIrregularPolygon(newRadius, 6 + Math.floor(Math.random() * 4), 0.4 + Math.random() * 0.3);
                            
                            const color = colorSet[Math.floor(Math.random() * colorSet.length)];
                            
                            fragments.push({
                                x: enemy.x + Math.cos(newAngle) * 15,
                                y: enemy.y + Math.sin(newAngle) * 15,
                                radius: newRadius,
                                collisionRadius: newRadius,
                                speedX: Math.cos(newAngle) * speed + enemy.speedX * 0.2,
                                speedY: Math.sin(newAngle) * speed + enemy.speedY * 0.2,
                                polygon: newPolygon,
                                color: color,
                                shadowColor: "#cc5500",
                                rotation: Math.random() * Math.PI * 2,
                                rotSpeed: (Math.random() - 0.5) * 0.03,
                            });
                        }
                        return fragments;
                    }
                }
                return [];
            }

            // ---------- Colisiones ----------
            function handleCollisions() {
                if (!gameActive) return;

                // Colisión con el planeta
                if (currentPlanet.active && currentPlanet.y < H + 100 && !currentPlanet.destroyed) {
                    const dx = player.x - currentPlanet.x;
                    const dy = player.y - currentPlanet.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < player.collisionRadius + currentPlanet.collisionRadius) {
                        gameActive = false;
                        gameOverFlag = true;
                        gameWon = true;
                        currentPlanet.destroyed = true;
                        
                        playExplosionSound();
                        
                        const radius = currentPlanet.radius;
                        const asteroidCount = Math.floor(25 + radius * 0.6);
                        
                        spawnExplosionAsteroids(currentPlanet.x, currentPlanet.y, asteroidCount, radius, currentPlanet.color);
                        
                        // Pequeña explosión de partículas para efecto visual
                        spawnExplosionParticles(currentPlanet.x, currentPlanet.y, '#ff6b35', 15);
                        spawnExplosionParticles(currentPlanet.x, currentPlanet.y, '#ffaa00', 10);
                        
                        // Explosión del asteroide jugador
                        spawnExplosionParticles(player.x, player.y, '#4fc3f7', 30);
                        spawnExplosionParticles(player.x, player.y, '#81d4fa', 20);
                        player.visible = false;
                        
                        const isLastPlanet = currentPlanetIndex >= PLANETS.length - 1;
                        gameOverDiv.style.display = 'block';
                        gameOverDiv.classList.add('win');
                        if (isLastPlanet) {
                            gameOverDiv.innerHTML = '🌌 ¡SISTEMA SOLAR DESTRUIDO!<br><small>¡Has completado todos los planetas!</small>';
                            nextLevelBtn.classList.remove('visible');
                            resetBtn.classList.add('visible');
                        } else {
                            gameOverDiv.innerHTML = `💥 ¡${currentPlanet.name} DESTRUIDO!<br><small>¡Has completado el nivel!</small>`;
                            nextLevelBtn.classList.add('visible');
                            resetBtn.classList.remove('visible');
                        }
                        
                        updateUI();
                        return;
                    }
                }

                // Colisión entre asteroides enemigos
                for (let i = 0; i < enemies.length; i++) {
                    for (let j = i + 1; j < enemies.length; j++) {
                        const a = enemies[i];
                        const b = enemies[j];
                        if (checkCollision(a, b)) {
                            const dx = a.x - b.x;
                            const dy = a.y - b.y;
                            const angle = Math.atan2(dy, dx);
                            
                            playCollisionSound();
                            
                            const midX = (a.x + b.x) / 2;
                            const midY = (a.y + b.y) / 2;
                            spawnExplosionParticles(midX, midY, '#ff6b35', 10);
                            spawnExplosionParticles(midX, midY, '#ffaa33', 7);
                            
                            const fragmentsA = splitAsteroid(a, angle);
                            const fragmentsB = splitAsteroid(b, angle + Math.PI);
                            
                            enemies.splice(j, 1);
                            enemies.splice(i, 1);
                            
                            enemies.push(...fragmentsA);
                            enemies.push(...fragmentsB);
                            
                            break;
                        }
                    }
                }

                // Colisión con jugador
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    if (checkCollision(player, enemy)) {
                        playCollisionSound();
                        
                        const dx = player.x - enemy.x;
                        const dy = player.y - enemy.y;
                        const angle = Math.atan2(dy, dx);
                        
                        spawnExplosionParticles(enemy.x, enemy.y, '#ff6b35', 20);
                        spawnExplosionParticles(enemy.x, enemy.y, '#ff8c00', 15);
                        spawnExplosionParticles(enemy.x, enemy.y, '#ffaa33', 10);
                        
                        const fragments = splitAsteroid(enemy, angle + Math.PI);
                        
                        player.structure = Math.max(0, player.structure - 1);
                        
                        if (player.structure <= 0) {
                            player.visible = false;
                            player.radius = 0;
                            player.collisionRadius = 0;
                            player.polygon = [];
                            
                            gameActive = false;
                            gameOverFlag = true;
                            gameOverDiv.style.display = 'block';
                            gameOverDiv.classList.remove('win');
                            gameOverDiv.innerHTML = '💥 FRACASO<br><small>Tu asteroide se desintegró</small>';
                            resetBtn.classList.add('visible');
                            nextLevelBtn.classList.remove('visible');
                            
                            spawnExplosionParticles(player.x, player.y, '#81d4fa', 30);
                            spawnExplosionParticles(player.x, player.y, '#4fc3f7', 20);
                            spawnExplosionParticles(player.x, player.y, '#ffffff', 15);
                            
                            updateUI();
                            return;
                        }
                        
                        player.radius = player.baseRadius * (0.7 + 0.3 * (player.structure / 5));
                        player.collisionRadius = player.radius * 0.8;
                        player.polygon = generateIrregularPolygon(player.radius, 8 + Math.floor(player.structure * 1.5), 0.5);
                        player.visible = true;

                        enemyBaseSpeed += 1;

                        spawnExplosionParticles(player.x, player.y, '#81d4fa', 10);

                        enemies.splice(i, 1);
                        enemies.push(...fragments);

                        updateUI();
                    }
                }
            }

            // Función auxiliar para partículas de explosión (reducidas)
            function spawnExplosionParticles(x, y, color, count) {
                for (let j = 0; j < count; j++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 3;
                    trailParticles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1,
                        life: 0.6 + Math.random() * 0.3,
                        decay: 0.01 + Math.random() * 0.02,
                        size: 1.5 + Math.random() * 3,
                        color: color
                    });
                }
            }

            // ---------- Spawn de enemigos con colores del nivel ----------
            function spawnEnemy() {
                if (!gameActive) return;
                const radius = 12 + Math.random() * 20;
                const x = 20 + Math.random() * (W - 40);
                const y = -radius - 10;
                const speedX = (Math.random() - 0.5) * 0.8;

                const vertices = 6 + Math.floor(Math.random() * 7);
                const irregularity = 0.4 + Math.random() * 0.4;
                const polygon = generateIrregularPolygon(radius, vertices, irregularity);

                const colorSet = ASTEROID_COLORS[currentColorIndex];
                const color = colorSet[Math.floor(Math.random() * colorSet.length)];

                enemies.push({
                    x: x,
                    y: y,
                    radius: radius,
                    collisionRadius: radius,
                    speedX: speedX,
                    speedY: enemyBaseSpeed,
                    polygon: polygon,
                    color: color,
                    shadowColor: "#cc5500",
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.025,
                });
            }

            // ---------- Actualización ----------
            function updateEnemies() {
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    e.x += e.speedX;
                    e.y += e.speedY;
                    e.rotation += e.rotSpeed;

                    if (e.y > H + 50 || e.x < -50 || e.x > W + 50) {
                        enemies.splice(i, 1);
                    }
                }
            }

            function updatePlayer() {
                if (!gameActive) return;

                const MOVE_SPEED = player.speed;

                if (keys.up) player.y -= MOVE_SPEED;
                if (keys.down) player.y += MOVE_SPEED;
                if (keys.left) player.x -= MOVE_SPEED;
                if (keys.right) player.x += MOVE_SPEED;

                player.x = Math.max(player.radius + 2, Math.min(W - player.radius - 2, player.x));
                player.y = Math.max(player.radius + 2, Math.min(H - player.radius - 2, player.y));

                player.rotation += 0.02;

                if (gameActive && player.visible) {
                    const angle = Math.PI / 2;
                    for (let i = 0; i < 3; i++) {
                        const spread = (Math.random() - 0.5) * 0.8;
                        const dist = player.radius * 0.5 + Math.random() * 8;
                        const px = player.x + Math.cos(angle + spread) * dist;
                        const py = player.y + Math.sin(angle + spread) * dist + 5;
                        spawnTrailParticle(px, py, trailColor);
                    }
                }

                updateUI();
            }

            // ---------- Dibujar ----------
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // ---- Fondo ----
                starOffset += STAR_SPEED;
                if (starOffset > H * 2) starOffset -= H * 2;

                for (let layer = 0; layer < 3; layer++) {
                    const layerSpeed = 1 + layer * 0.5;
                    const layerOffset = (starOffset * layerSpeed) % (H * 2);
                    
                    for (let star of stars) {
                        if (star.layer !== layer) continue;
                        let yPos = (star.y + layerOffset) % (H * 2);
                        if (yPos > H) yPos -= H * 2;
                        if (yPos < -H) yPos += H * 2;
                        
                        const alpha = star.brightness * 0.4;
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath();
                        ctx.arc(star.x, yPos, star.size * (0.5 + layer * 0.25), 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.globalAlpha = 1;

                // ---- Planeta (solo si no está destruido) ----
                if (currentPlanet.active && !currentPlanet.destroyed) {
                    drawPlanet(ctx, currentPlanet, currentPlanet.radius);

                } else if (!currentPlanet.destroyed) {
                    ctx.fillStyle = "#ff883366";
                    ctx.font = "bold 16px monospace";
                    ctx.textAlign = "center";
                    const timeLeft = Math.max(0, Math.ceil(currentPlanet.appearTime - gameTime));
                    ctx.fillText(`🌍 ${currentPlanet.name} en ${timeLeft}s`, 200, 30);
                    ctx.textAlign = "left";
                }

                // ---- Asteroides de explosión ----
                drawExplosionAsteroids();

                // ---- Cola de partículas ----
                drawTrailParticles();

                // ---- Enemigos con colores del nivel ----
                for (let e of enemies) {
                    drawPlayerPolygon(
                        ctx,
                        e.x, e.y,
                        e.polygon,
                        e.color,
                        e.shadowColor || "#cc5500",
                        e.rotation,
                        false
                    );
                }

                // ---- Jugador (solo si es visible) ----
                if (player.visible) {
                    drawPlayerPolygon(
                        ctx,
                        player.x, player.y,
                        player.polygon,
                        playerColor,
                        "#4fc3f7",
                        player.rotation,
                        true,
                        playerGlowColor
                    );
                }

                // ---- Indicadores OCULTOS ----
                // Se ha eliminado toda la información de la esquina superior izquierda
                // (❤️, 💀, ⚡, ✦, 🌍, 📏, 💥)
            }

            // ---------- Bucle principal ----------
            function loop() {
                if (!gameOverFlag) {
                    gameTime += 1/60;
                    if (gameTime >= currentPlanet.appearTime && !currentPlanet.active) {
                        currentPlanet.active = true;
                    }

                    if (currentPlanet.active && !currentPlanet.destroyed) {
                        currentPlanet.y += currentPlanet.speed;
                    }

                    frameCounter++;
                    if (frameCounter >= spawnRate) {
                        frameCounter = 0;
                        spawnEnemy();
                    }

                    updatePlayer();
                    updateEnemies();
                    updateTrailParticles();
                    updateExplosionAsteroids();
                    handleCollisions();
                    updateUI();
                } else {
                    updateTrailParticles();
                    updateExplosionAsteroids();
                }

                draw();
                requestAnimationFrame(loop);
            }

            // ---------- Siguiente Nivel ----------
            function goToNextLevel() {
                currentPlanetIndex++;
                if (currentPlanetIndex >= PLANETS.length) {
                    currentPlanetIndex = 0;
                }
                updatePlanetFromIndex(currentPlanetIndex);
                resetGame();
                enemyBaseSpeed = 2 + currentPlanetIndex * 0.3;
                spawnRate = Math.max(18, 35 - currentPlanetIndex * 1.5);
                updateUI();
            }

            // ---------- Eventos de teclado ----------
            function keydownHandler(e) {
                const key = e.key;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Space'].includes(key)) {
                    e.preventDefault();
                }

                switch (key) {
                    case 'ArrowUp':
                        keys.up = true;
                        break;
                    case 'ArrowDown':
                        keys.down = true;
                        break;
                    case 'ArrowLeft':
                        keys.left = true;
                        break;
                    case 'ArrowRight':
                        keys.right = true;
                        break;
                }
            }

            function keyupHandler(e) {
                const key = e.key;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Space'].includes(key)) {
                    e.preventDefault();
                }

                switch (key) {
                    case 'ArrowUp':
                        keys.up = false;
                        break;
                    case 'ArrowDown':
                        keys.down = false;
                        break;
                    case 'ArrowLeft':
                        keys.left = false;
                        break;
                    case 'ArrowRight':
                        keys.right = false;
                        break;
                }
            }

            window.addEventListener('keydown', keydownHandler);
            window.addEventListener('keyup', keyupHandler);

            resetBtn.addEventListener('click', resetGame);
            nextLevelBtn.addEventListener('click', goToNextLevel);

            // Inicializar con el primer planeta
            updatePlanetFromIndex(0);
            resetGame();

            loop();

            window.addEventListener('unload', () => {
                window.removeEventListener('keydown', keydownHandler);
                window.removeEventListener('keyup', keyupHandler);
                stopAmbientMusic();
            });

        })();
    </script>
</body>
